<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="color-scheme" content="light only">
<title>BỘ CÔNG CỤ QLKH</title>
<style>

  :root {
    --blue:#075B9A; --blue2:#0E78C7; --blue3:#1F75BC; --cream:#EAF4FF;
    --paper:#fff; --line:#C7DDF2; --text:#102A43; --muted:#536779;
    --green:#16723A; --red:#C62828; --redbg:#FFF0F0;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { min-height:100%; font-family:'Arial Unicode MS', Arial, sans-serif; background:var(--cream); color:var(--text); font-size:13.5px; }
  .top { position:sticky; top:0; z-index:50; background:linear-gradient(135deg,var(--blue),var(--blue2)); color:#fff; border-bottom:3px solid var(--blue3); box-shadow:0 3px 14px rgba(7,91,154,.18); }
  .top-inner { max-width:1450px; margin:0 auto; padding:12px 14px 0; }
  .brand { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; }
  .brand-left { display:flex; align-items:center; gap:12px; min-width:280px; }
  .logo { width:44px; height:44px; border-radius:12px; display:grid; place-items:center; background:rgba(255,255,255,.18); color:#fff; font-weight:900; font-size:22px; }
  h1 { font-size:20px; line-height:1.2; font-weight:900; letter-spacing:.015em; text-transform:uppercase; }
  .subtitle { font-size:12px; color:#D9F0FF; margin-top:3px; line-height:1.35; }
  .meta { text-align:right; font-size:11.5px; color:#D9F0FF; line-height:1.45; max-width:490px; }
  .badge { display:inline-block; padding:3px 10px; border-radius:999px; border:1px solid rgba(255,255,255,.34); background:rgba(255,255,255,.14); color:#fff; font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.35px; margin-bottom:3px; }
  .tabs { display:flex; gap:4px; margin-top:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .tab { border:0; background:transparent; color:#D9F0FF; padding:11px 20px; cursor:pointer; font:800 13px/1.2 'Arial Unicode MS', Arial, sans-serif; border-radius:10px 10px 0 0; border-bottom:3px solid transparent; white-space:nowrap; }
  .tab.active { background:#fff; color:var(--blue); border-bottom-color:var(--blue3); }
  .wrap { max-width:1450px; margin:0 auto; padding:10px 10px 18px; }
  .notice { background:#fff; border:1px solid var(--line); border-left:5px solid var(--blue3); border-radius:12px; padding:9px 12px; color:var(--muted); font-size:12.5px; line-height:1.45; margin-bottom:10px; }
  .notice strong { color:var(--blue); }
  .panel { display:none; } .panel.active { display:block; }
  .frame-card,.utility-shell { background:#fff; border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:0 3px 14px rgba(7,91,154,.08); }
  .frame-head,.utility-head { background:linear-gradient(180deg,#fff,#F3F9FF); border-bottom:1px solid var(--line); }
  .frame-head { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; padding:9px 12px; }
  .frame-title { font-weight:900; color:var(--blue); font-size:14px; } .frame-desc { font-size:11.5px; color:var(--muted); }
  iframe { width:100%; height:calc(100vh - 176px); min-height:680px; border:0; display:block; background:#fff; }
  .utility-head { padding:12px; }
  .utility-title { display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
  .utility-title h2 { font-size:15px; color:var(--blue); line-height:1.25; } .utility-title p { font-size:11.8px; color:var(--muted); margin-top:3px; line-height:1.45; }
  .u-tabs { display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch; }
  .u-tab { border:1px solid var(--line); background:#fff; color:var(--muted); border-radius:999px; padding:8px 13px; font:800 12.5px/1.2 'Arial Unicode MS', Arial, sans-serif; cursor:pointer; white-space:nowrap; }
  .u-tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  .u-panel { display:none; } .u-panel.active { display:block; }
  .u-frame-head { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; padding:8px 12px; border-bottom:1px solid var(--line); background:#fff; }
  .u-frame-title { font-weight:900; color:var(--blue); font-size:13px; } .u-frame-note { color:var(--muted); font-size:11.5px; line-height:1.4; }
  .u-panel iframe { height:calc(100vh - 230px); min-height:640px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:8px; margin-top:8px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 10px; font-size:12px; color:var(--muted); line-height:1.45; } .card b { color:var(--blue); }
  .loading { padding:42px; text-align:center; color:var(--muted); font-size:13px; }
  @media(max-width:850px) { .top-inner{padding:10px 10px 0} .brand-left{width:100%;min-width:0;align-items:flex-start} .meta{text-align:left;max-width:none;width:100%} h1{font-size:17px} .subtitle{font-size:11px} .tab{padding:10px 14px;font-size:12px} .wrap{padding:8px 6px 12px} iframe{height:calc(100vh - 196px);min-height:620px} .u-panel iframe{height:calc(100vh - 270px);min-height:600px} .frame-head,.utility-title,.u-frame-head{align-items:flex-start} .u-tab{padding:8px 11px;font-size:12px} }

</style>
</head>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="brand-left">
        <div class="logo">📊</div>
        <div>
          <h1>BỘ CÔNG CỤ QLKH</h1>
          
        </div>
      </div>
      <div class="meta"></div>
    </div>
    <nav class="tabs" aria-label="Mục chính">
      <button class="tab active" data-tab="qlkh" onclick="showMain('qlkh')">📊 QLKH</button>
      <button class="tab" data-tab="tienich" onclick="showMain('tienich')">🧰 Tiện ích</button>
    </nav>
  </div>
</header>

<main class="wrap">
  <section id="panel-qlkh" class="panel active">
    <div class="frame-card">
      <div class="frame-head">
        <div class="frame-title">📊 QLKH - Dashboard quản lý khách hàng</div>
        <div class="frame-desc"></div>
      </div>
      <iframe id="qlkhFrame" title="Dashboard QLKH"><div class="loading">Đang tải QLKH...</div></iframe>
    </div>
  </section>

  <section id="panel-tienich" class="panel">
    <div class="utility-shell">
      <div class="utility-head">
        <div class="utility-title">
          <div>
            <h2>🧰 Tiện ích nội bộ</h2>
            <p>Chọn tiện ích cần dùng.</p>
          </div>
          <div class="u-frame-note"></div>
        </div>
        <div class="u-tabs" aria-label="Tiện ích con">
          <button class="u-tab active" data-util="rate" onclick="showUtil('rate')">💰 Lãi suất / Phí</button>
          <button class="u-tab" data-util="ltv" onclick="showUtil('ltv')">⚖ LTV / TSBĐ</button>
        </div>
      </div>
      <div id="util-rate" class="u-panel active">
        <div class="u-frame-head">
          <div class="u-frame-title">💰 Tra cứu Lãi suất, Cho vay, Phí & Phạt</div>
          <div class="u-frame-note"></div>
        </div>
        <iframe id="rateFrame" title="Tra cứu lãi suất và phí"><div class="loading">Đang tải Lãi suất...</div></iframe>
      </div>
      <div id="util-ltv" class="u-panel">
        <div class="u-frame-head">
          <div class="u-frame-title">⚖ Tra cứu Thẩm quyền & LTV TSBĐ</div>
          <div class="u-frame-note"></div>
        </div>
        <iframe id="ltvFrame" title="Tra cứu LTV và tài sản bảo đảm"><div class="loading">Đang tải LTV...</div></iframe>
      </div>
    </div>
  </section>
</main>

const loadedFrames = new Set();
function decodeHtml(chunks) {
  const bin = atob(chunks.join(''));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function loadFrame(id, chunks) {
  if (loadedFrames.has(id)) return;
  const frame = document.getElementById(id);
  if (!frame) return;
  frame.srcdoc = decodeHtml(chunks);
  loadedFrames.add(id);
}
function showMain(tab) {

  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));

  if (tab === 'tienich') showUtil('rate');
}
function showUtil(util) {
  document.querySelectorAll('.u-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.u-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('util-' + util).classList.add('active');
  document.querySelector(`.u-tab[data-util="${util}"]`)?.classList.add('active');
  if (util === 'ltv') loadFrame('ltvFrame', LTV_B64_CHUNKS);
  if (util === 'rate') loadFrame('rateFrame', RATE_B64_CHUNKS);
}
window.addEventListener('DOMContentLoaded', () => { loadFrame('qlkhFrame', QLKH_B64_CHUNKS); });
</script>
